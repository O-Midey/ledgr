<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    /* Light mode: dark card so it's visible on white browser chrome */
    .bg   { fill: #0d0d0d; }
    .l    { fill: #f2f2f2; }
    .ring { fill: #0d0d0d; }
    /* Dark mode: light card so it's visible on dark browser chrome */
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #efefef; }
      .l    { fill: #0d0d0d; }
      .ring { fill: #efefef; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="7"/>
  <rect class="l" x="7" y="5" width="5" height="20"/>
  <rect class="l" x="7" y="20" width="14" height="5"/>
  <circle class="ring" cx="24.5" cy="7.5" r="5.5"/>
  <circle cx="24.5" cy="7.5" r="4" fill="#22d489"/>
</svg>
